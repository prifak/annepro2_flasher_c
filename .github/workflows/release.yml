name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libudev-dev pkg-config libusb-1.0-0-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Prepare Binaries for Release
      shell: bash
      run: |
        mkdir -p release_assets
        if [ "${{ runner.os }}" = "Windows" ]; then
          # На винде ищем .exe (он может лежать в build/bin или build/bin/Release)
          find build -name "annepro2_flasher.exe" -exec cp {} release_assets/annepro2_flasher-windows.exe \;
        elif [ "${{ runner.os }}" = "macOS" ]; then
          find build -name "annepro2_flasher" -exec cp {} release_assets/annepro2_flasher-macos \;
        else
          find build -name "annepro2_flasher" -exec cp {} release_assets/annepro2_flasher-linux \;
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ matrix.os }}
        path: release_assets/*

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_binaries
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: all_binaries/*
          generate_release_notes: true
